<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA redirect - handles PWA install scope issue
      var path = window.location.pathname;
      if (path === '/' || !path.startsWith('/Workshop-Manager')) {
        window.location.replace('/Workshop-Manager/');
      }
    </script>
  </head>
  <body></body>
</html>
